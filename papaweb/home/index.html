<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="/papaweb/icons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/papaweb/icons/favicon.svg" />
    <link rel="shortcut icon" href="/papaweb/icons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/papaweb/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Papa Web" />
    <link rel="manifest" href="/papaweb/icons/site.webmanifest" />

    <style>
        :root {
            --primary-blue: #12009e;
            --bright-green: #00d656;
            --text-dark: #000000;
            --text-grey: #555555;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            animation: fadeIn 0.35s ease;
            /* Evita scroll horizontal en toda la página por si acaso */
            overflow-x: hidden; 
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* --- Header Section --- */
        header {
            background-color: var(--primary-blue);
            color: var(--white);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            
            /* Configuraciones para scroll horizontal */
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* Desplazamiento suave en iOS */
            scrollbar-width: none; /* Oculta la barra en Firefox */
        }

        /* Oculta la barra de desplazamiento en Chrome, Safari y Opera */
        header::-webkit-scrollbar {
            display: none; 
        }

        .logo-container {
            display: flex;
            align-items: center;
            height: 100%;
            flex-shrink: 0; /* Evita que el logo se encoja */
        }

        .logo-img {
            height: 40px;
            width: auto;
            margin-right: 15px;
        }

        .nav-item {
            font-weight: 700;
            font-size: 1rem;
            padding: 0 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            flex-shrink: 0; /* Evita que los botones se encojan o rompan a dos líneas */
        }

        .nav-item.active {
            background-color: var(--white);
            color: var(--primary-blue);
            padding: 8px 18px;
            border-radius: 12px;
            animation: popActive 0.35s ease forwards;
        }

        /* --- Papa Lab Button --- */
        .nav-item.nav-lab {
            background-color: var(--bright-green);
            color: var(--text-dark);
            padding: 8px 18px;
            border-radius: 12px;
        }

        .nav-item.nav-lab:hover {
            transform: scale(1.05);
        }

        @keyframes popActive {
            0% { transform: scale(0.8); opacity: 0; }
            60% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); }
        }

        .separator {
            width: 2px;
            height: 25px;
            background-color: rgba(255, 255, 255, 0.8);
            flex-shrink: 0; /* Evita que los separadores desaparezcan o se encojan */
        }

        /* --- Notification Bar --- */
        .notification-bar {
            background-color: var(--bright-green);
            color: var(--white);
            width: 100%;
            padding: 6px 0;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        
        .notification-bar:hover {
            text-decoration: underline;
        }

        .notification-arrow {
            width: 12px;
            height: 12px;
            fill: none;
            stroke: white;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-bottom: 2px;
        }

        /* --- Hero Section --- */
        .hero {
            background-color: var(--white);
            text-align: center;
            padding: 40px 20px 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-grey);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .hero-image-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            margin-bottom: -10px;
            z-index: 2;
            position: relative;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 20px;
        }

        /* --- Split Section --- */
        .split-section {
            display: flex;
            width: 100%;
            flex: 1;
            min-height: 500px;
        }

        .left-panel {
            background-color: var(--primary-blue);
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .left-panel h2 {
            color: var(--white);
            font-size: 3.5rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
        }

        .right-panel {
            background-color: var(--white);
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .right-panel h2 {
            color: var(--text-dark);
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.2;
        }

        #juegos {
            background-color: var(--primary-blue);
            color: var(--white);
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 40px;
            width: 220px;
            justify-content: center;
            transition: transform 0.2s;
            border: none;
            cursor: pointer;
        }

        #juegos:hover {
            transform: scale(1.05);
        }

        .arrow-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: white;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .split-section {
                flex-direction: column;
            }
            .left-panel, .right-panel {
                width: 100%;
                padding: 40px 20px;
            }
            .hero h1 {
                font-size: 2.5rem;
            }
            .left-panel h2, .right-panel h2 {
                font-size: 2rem;
            }
            .notification-bar {
                padding: 10px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="/papaweb/Header Icon.png" alt="Papa Logo" class="logo-img">
        </div>
        <div class="nav-item active">Papa Web</div>
        <div class="separator"></div>
        <div class="nav-item" onclick="animateAndGo('/papaweb/games/')">Papa Games</div>
        <div class="separator"></div>
        <div class="nav-item" onclick="animateAndGo('/papaweb/blog/')">Papa Blog</div>
        <div class="separator"></div>
        <div class="nav-item nav-lab" onclick="animateAndGo('/papaweb/lab/')">Papa Lab</div>
    </header>

    <div class="notification-bar" onclick="animateAndGo('/papaweb/blog/2026/03/papa_lab/')">
        <span>Presentamos Papa Lab, el espacio de desarollo de Papa Pedo</span>
        <svg class="notification-arrow" viewBox="0 0 24 24">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
        </svg>
    </div>

    <main>
        <section class="hero">
            <h1>Bienvenido a Papa Web</h1>
            <p>El mejor lugar de todo el internet.</p>
            <div class="hero-image-container">
                <img src="/papaweb/Golden Cloud.png" alt="Golden Cloud Character" class="hero-image">
            </div>
        </section>

        <section class="split-section">
            <div class="left-panel">
                <h2>La mejor forma<br>para todo<br>es siempre<br>Papa<br>Pedo</h2>
            </div>
            <div class="right-panel">
                <h2>Juega con<br>nosotros:</h2>
               <button id="juegos" onclick="animateAndGo('/papaweb/games/')">
                    <span>Mirar</span>
                    <svg class="arrow-icon" viewBox="0 0 24 24">
                        <line x1="7" y1="17" x2="17" y2="7"></line>
                        <polyline points="7 7 17 7 17 17"></polyline>
                    </svg>
                </button>
            </div>
        </section>
    </main>

    <script>
        function animateAndGo(url) {
            document.body.style.animation = "fadeOut 0.25s ease forwards";
            setTimeout(() => {
                window.location.href = url;
            }, 250);
        }
    </script>
</body>
</html>
