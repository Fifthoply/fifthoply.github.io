<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa Blog</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #12009e;
            --white: #ffffff;
            --card-radius: 35px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background-color: var(--white);
        }

        /* --- Header Section --- */
        header {
            background-color: var(--primary-blue);
            color: var(--white);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .logo-img {
            height: 40px;
            width: auto;
            margin-right: 15px;
        }

        .nav-item {
            font-weight: 700;
            font-size: 1rem;
            padding: 0 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .nav-item.active {
            background-color: var(--white);
            color: var(--primary-blue);
            padding: 8px 18px;
            border-radius: 12px;
        }

        .separator {
            width: 2px;
            height: 25px;
            background-color: rgba(255, 255, 255, 0.8);
        }

        /* --- Main Grid Layout --- */
        main {
            padding: 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            width: 100%;
        }

        /* --- The Frame (Blog Card) --- */
        .blog-card {
            background-color: var(--primary-blue);
            border-radius: var(--card-radius);
            padding: 30px;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(18, 0, 158, 0.3);
        }

        .card-image-container {
            background-color: var(--white);
            width: 100%;
            height: 250px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
            padding: 10px;
        }

        .card-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* --- NUEVO: Clase para rellenar completamente el contenedor --- */
        .card-image-container.image-cover {
            padding: 0; /* Quita el margen blanco */
        }

        .card-image-container.image-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Recorta la imagen para llenar todo sin deformarse */
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            .blog-grid {
                grid-template-columns: 1fr; 
                padding: 10px;
            }
            main {
                padding: 20px;
            }
            .card-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="/papaweb/Header Icon.png" alt="Papa Logo" class="logo-img">
        </div>
        <a href="/papaweb/" class="nav-item" style="text-decoration:none; color:white;">Papa Web</a>
        <div class="separator"></div>
        <a href="/papaweb/games/" class="nav-item" style="text-decoration:none; color:white;">Papa Games</a>
        <div class="separator"></div>
        <div class="nav-item active">Papa Blog</div>
    </header>

    <main>
        <div class="blog-grid">
            
            <a href="/papaweb/blog/2026/03/pausa_de_desarollo" class="blog-card">
                <!-- Se ha añadido la clase "image-cover" aquí -->
                <div class="card-image-container image-cover">
                    <img src="/papaweb/blog/thumbnail/pausa_de_desarollo.png" alt="Blog Thumbnail">
                </div>
                <h2 class="card-title">Pausa de Desarollo</h2>
            </a>

            <a href="/papaweb/blog/2026/01/el_nuevo_blog" class="blog-card">
                <div class="card-image-container">
                    <img src="/papaweb/blog/thumbnail/el_nuevo_blog.png" alt="Blog Thumbnail">
                </div>
                <h2 class="card-title">El nuevo Papa<br>Blog</h2>
            </a>

             <a href="/papaweb/blog/2026/03/papa_lab" class="blog-card">
                <div class="card-image-container" color="black">
                    <img src="/papaweb/blog/thumbnail/papa_lab.png" alt="Blog Thumbnail">
                </div>
                <h2 class="card-title">Papa Lab</h2>
            </a>

        </div>
    </main>

</body>
</html>
